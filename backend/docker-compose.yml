# KK.AI backend — Khadafi's RAG chatbot API.
# Runs alongside the existing n8n + copyengine stack, behind the SAME Traefik
# reverse proxy (container: n8n-traefik-1) that already terminates HTTPS on :443.
#
# Traefik is configured entirely through the labels below — no Caddyfile, no
# host port publish. This container joins the existing `n8n_default` network,
# and Traefik routes  https://api.khadafiai.my.id  ->  this container :8000.
# The pattern mirrors copyengine exactly (entrypoint websecure + certresolver
# mytlschallenge), so it gets an automatic Let's Encrypt cert.
#
# NOTE: the internal port 8000 does NOT clash with copyengine's 8000 — each
# container has its own network namespace, and neither is published to the host.

services:
  kkai-backend:
    build: .
    image: kkai-backend
    container_name: kkai-backend
    restart: unless-stopped
    env_file: .env
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      # Router: match the api subdomain, HTTPS entrypoint, auto TLS.
      - "traefik.http.routers.kkai-api.rule=Host(`api.khadafiai.my.id`)"
      - "traefik.http.routers.kkai-api.entrypoints=websecure"
      - "traefik.http.routers.kkai-api.tls=true"
      - "traefik.http.routers.kkai-api.tls.certresolver=mytlschallenge"
      # Service: tell Traefik the container listens on 8000.
      - "traefik.http.services.kkai-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Join the pre-existing network that Traefik + n8n + copyengine already share.
networks:
  n8n_default:
    external: true
