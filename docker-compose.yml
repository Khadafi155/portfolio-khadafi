# KK.AI — Khadafi's portfolio (frontend) + RAG chatbot API (backend).
# Both run on the VPS behind the existing Traefik proxy (container n8n-traefik-1)
# that already terminates HTTPS on :443, alongside n8n + copyengine.
#
# Routing (all auto-HTTPS via Let's Encrypt / certresolver "mytlschallenge"):
#   https://khadafiai.my.id        + www  -> kkai-frontend  (Next.js, :3000)
#   https://api.khadafiai.my.id           -> kkai-backend   (FastAPI,  :8000)
#
# Nothing is published to the host — Traefik reaches both over n8n_default.
# Deploy from the repo root:  docker compose up -d --build

services:
  kkai-frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is baked at build time -> point the browser at the API.
        NEXT_PUBLIC_API_URL: https://api.khadafiai.my.id
    image: kkai-frontend
    container_name: kkai-frontend
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.kkai-fe.rule=Host(`khadafiai.my.id`) || Host(`www.khadafiai.my.id`)"
      - "traefik.http.routers.kkai-fe.entrypoints=websecure"
      - "traefik.http.routers.kkai-fe.tls=true"
      - "traefik.http.routers.kkai-fe.tls.certresolver=mytlschallenge"
      - "traefik.http.services.kkai-fe.loadbalancer.server.port=3000"

  kkai-backend:
    build: ./backend
    image: kkai-backend
    container_name: kkai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.kkai-api.rule=Host(`api.khadafiai.my.id`)"
      - "traefik.http.routers.kkai-api.entrypoints=websecure"
      - "traefik.http.routers.kkai-api.tls=true"
      - "traefik.http.routers.kkai-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.kkai-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Pre-existing network shared by Traefik + n8n + copyengine.
networks:
  n8n_default:
    external: true
